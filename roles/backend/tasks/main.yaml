- name: Disable default nodejs version.
  ansible.builtin.command: "dnf module disable nodejs -y"

- name: Enable nodejs version 20
  ansible.builtin.command: "dnf module enable nodejs:20 -y"

- name: Install nodejs
  ansible.builtin.package:
    name: "{{item}}"
    state: present
  loop:
  - nodejs
  - mysql

- name: Install Python libraries
  ansible.builtin.pip:
    name: "{{ item }}"
    executable: pip3.9
  loop:
  - cryptography
  - PyMySQL

- name: Create expense user 
  ansible.builtin.user:
    name: expense

- name: Include from common roles
  include_role:
    name: common
    tasks_from: main

- name: Install node packages
  community.general.npm:
    path: /app 

- name: Copy the backend service file
  ansible.builtin.template: #it will search in templates folder
    src: backend.service.j2
    dest: /etc/systemd/system/backend.service

- name: Import mysql data
  community.mysql.mysql_db:
    state: import
    name: all
    login_user: "{{ MYSQL_USERNAME }}"
    login_password: "{{ MYSQL_PASSWORD }}"
    login_host: "{{ MYSQL_HOST }}"
    target: /app/schema/backend.sql

- name: daemon reload and resart service
  ansible.builtin.systemd_service:
    enabled: true
    state: restarted
    daemon_reload: true
    name: backend 


